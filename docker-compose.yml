version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-franciscostore}
      POSTGRES_USER: ${DB_USER:-fsadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-FS_S3cur3_P4ss!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fsadmin} -d ${DB_NAME:-franciscostore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fs_network

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fs_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-FS_R3dis_P4ss!} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fs_network

  # ── Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: fs_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-fsadmin}:${DB_PASSWORD:-FS_S3cur3_P4ss!}@postgres:5432/${DB_NAME:-franciscostore}
      REDIS_URL: redis://:${REDIS_PASSWORD:-FS_R3dis_P4ss!}@redis:6379
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fs_network

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: fs_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    networks:
      - fs_network

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - fs_network

volumes:
  postgres_data:
  redis_data:
  nginx_cache:

networks:
  fs_network:
    driver: bridge